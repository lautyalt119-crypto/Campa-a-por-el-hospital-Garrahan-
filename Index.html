<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapitas por el Garrahan</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #4a4a4a;

        background-color: #f5f0e6;
        background-image: 
            radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
        background-size: 4px 4px;
    }

    .container {
        max-width: 600px;
        animation: fadeIn 1.5s ease forwards;
        opacity: 0;
    }

    .subtitle {
        font-size: 1.2rem;
        margin-bottom: 10px;
        letter-spacing: 1px;
        animation: fadeUp 1.5s ease forwards;
    }

    .counter {
        font-size: 5rem;
        font-weight: bold;
        margin: 20px 0;
        animation: fadeUp 2s ease forwards;
    }

    .phrase {
        font-size: 1rem;
        margin-top: 20px;
        opacity: 0.8;
        font-style: italic;
        animation: fadeUp 2.5s ease forwards;
    }

    .button {
        margin-top: 30px;
        padding: 12px 25px;
        font-size: 1rem;
        border: none;
        border-radius: 25px;
        background-color: #6b8e23;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        animation: fadeUp 3s ease forwards;
    }

    .button:hover {
        background-color: #556b1b;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="subtitle">Tapitas recolectadas para el Hospital Garrahan</div>
    <div class="counter" id="counter">0</div>
    <div class="phrase">"Es solo una tapita, todo está en tus manos"</div>

    <button class="button" onclick="goToHelp()">Quiero ayudar</button>
</div>

<script>
    const counter = document.getElementById("counter");

    let baseValue = 120000;
    let ratePerSecond = 1;

    let audioEnabled = false;

    // 🔊 Sonido click (muy corto)
    const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

    // Activar audio en primera interacción
    document.body.addEventListener("click", () => {
        audioEnabled = true;
    }, { once: true });

    function updateCounter() {
        baseValue += ratePerSecond;
        counter.textContent = baseValue.toLocaleString("es-AR");

        if (audioEnabled) {
            clickSound.currentTime = 0;
            clickSound.play();
        }
    }

    setInterval(updateCounter, 1000);

    function goToHelp() {
        window.open("https://www.garrahan.gov.ar/", "_blank");
    }
</script>

</body>
</html>
